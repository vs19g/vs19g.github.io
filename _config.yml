# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" 
title                    : "Vignesh Sitaraman"
title_separator          : "-"
name                     : &name "Vignesh Sitaraman"
description              : &description "PhD Candidate in Experimental Nuclear Physics"
url                      : "https://vs19g.github.io" 
baseurl                  : "" 
repository               : "vs19g.github.io"

# Site Author
author:
  avatar           : "profile.png" # Make sure to upload a photo named profile.png to /images/
  name             : "Vignesh Sitaraman"
  pronouns         : 
  bio              : "PhD Candidate specializing in experimental nuclear physics, detector construction, and digital DAQ systems."
  location         : "Tallahassee, FL"
  employer         : "Florida State University"
  uri              : 
  email            : "vsitaraman@fsu.edu" 

  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=BjY0FunPZVgC&hl"
  orcid            : "https://orcid.org/0000-0002-5561-5286" 
  arxiv            : 
  researchgate     : 

  # Repositories and software development
  github           : "vs19g"
  stackoverflow    : 

  # Social media
  linkedin         : "vignesh-sitaraman-1b5a62136" 
  bluesky          : 
  twitter          : 

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser              : 
breadcrumbs         : false 
words_per_minute    : 160
future              : true
read_more           : "disabled" 
talkmap_link        : true      # Set to true to show your presentation locations

# Analytics
analytics:
  provider           : "false" 

# Collections (Research, Teaching, etc.)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# These settings control how pages and collections are included in the site
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development